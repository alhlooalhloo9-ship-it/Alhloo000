<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نقاط البيع السحابية | SaaS POS</title>
    <!-- Google Fonts + Font Awesome + Chart.js -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --bg-light: #f4f7fc;
            --card-light: #ffffff;
            --text-light: #1e293b;
            --border-light: #e2e8f0;
            --primary: #7c3aed;
            --primary-dark: #5b21b6;
            --accent-gold: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f97316;
            --sidebar-width: 260px;
            --header-height: 70px;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
        }

        body.dark {
            --bg-light: #0f172a;
            --card-light: #1e293b;
            --text-light: #f1f5f9;
            --border-light: #334155;
            --primary: #a78bfa;
            --primary-dark: #8b5cf6;
        }

        body {
            background: var(--bg-light);
            color: var(--text-light);
            transition: background 0.3s, color 0.2s;
        }

        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--card-light);
            border-left: 1px solid var(--border-light);
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow);
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 1.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .sidebar-header i {
            font-size: 1.8rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            margin: 6px 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        .nav-item.active, .nav-item:hover {
            background: var(--primary);
            color: white;
        }

        /* Main content */
        .main-content {
            flex: 1;
            margin-right: var(--sidebar-width);
            transition: margin 0.3s;
        }

        .top-bar {
            height: var(--header-height);
            background: var(--card-light);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 99;
            backdrop-filter: blur(4px);
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .dark-toggle, .notif-icon {
            background: var(--bg-light);
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
            margin-left: 12px;
        }

        .content-pane {
            padding: 24px;
        }

        /* Cards */
        .card {
            background: var(--card-light);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            transition: transform 0.2s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* POS Grid */
        .pos-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }
        .products-grid {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }
        .cart-panel {
            flex: 1.2;
            background: var(--card-light);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--border-light);
            height: fit-content;
            position: sticky;
            top: 90px;
        }

        .product-card {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-light);
        }
        .product-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border-light);
        }

        button {
            background: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button.secondary {
            background: var(--warning);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border-light);
            text-align: right;
        }

        .plan-card {
            background: var(--card-light);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            transition: all 0.2s;
        }
        .plan-card.popular {
            border: 2px solid var(--primary);
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
                width: 70%;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-right: 0;
            }
            .menu-toggle {
                display: block;
            }
            .pos-layout {
                flex-direction: column;
            }
        }
        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            background: none;
            color: var(--text-light);
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 1000;
            animation: fadein 0.3s;
        }
        @keyframes fadein {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .qr-demo {
            background: white;
            padding: 10px;
            border-radius: 16px;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-cloud-upload-alt"></i> <span>CloudPOS</span>
        </div>
        <div class="nav-menu" style="margin-top: 20px;">
            <div class="nav-item active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</div>
            <div class="nav-item" data-tab="pos"><i class="fas fa-cash-register"></i> نقطة البيع</div>
            <div class="nav-item" data-tab="products"><i class="fas fa-boxes"></i> المنتجات</div>
            <div class="nav-item" data-tab="customers"><i class="fas fa-users"></i> العملاء</div>
            <div class="nav-item" data-tab="reports"><i class="fas fa-chart-line"></i> التقارير</div>
            <div class="nav-item" data-tab="subscriptions"><i class="fas fa-tags"></i> الاشتراكات</div>
            <div class="nav-item" data-tab="settings"><i class="fas fa-cog"></i> الإعدادات</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div style="display: flex; align-items: center;">
                <div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
                <div class="page-title" id="pageTitle">لوحة التحكم</div>
            </div>
            <div style="display: flex;">
                <div class="notif-icon" id="notifBtn"><i class="fas fa-bell"></i></div>
                <div class="dark-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></div>
            </div>
        </div>

        <div class="content-pane" id="contentPane">
            <!-- Dynamic content injected via JS -->
        </div>
    </div>
</div>

<script>
    // ---------- Mock Data ----------
    let products = [
        { id: 1, name: "قهوة أمريكانو", price: 12, stock: 45, image: "☕" },
        { id: 2, name: "كابتشينو", price: 15, stock: 30, image: "🧋" },
        { id: 3, name: "كرواسون", price: 8, stock: 20, image: "🥐" },
        { id: 4, name: "شوكولاتة ساخنة", price: 18, stock: 12, image: "🍫" },
        { id: 5, name: "بيتزا صغيرة", price: 35, stock: 8, image: "🍕" },
        { id: 6, name: "مياه معدنية", price: 3, stock: 100, image: "💧" }
    ];
    let customers = [
        { id: 1, name: "أحمد علي", phone: "0501234567", totalSpent: 320 },
        { id: 2, name: "سارة خالد", phone: "0559876543", totalSpent: 540 }
    ];
    let orders = []; // for history
    let cart = [];
    let currentSale = { subtotal: 0, tax: 0, discount: 0, total: 0 };

    // helper functions
    function updateCartTotals() {
        let subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        let discount = currentSale.discount;
        let afterDiscount = subtotal - discount;
        let tax = afterDiscount * 0.15; // 15% VAT
        let total = afterDiscount + tax;
        currentSale.subtotal = subtotal;
        currentSale.tax = tax;
        currentSale.total = total;
    }

    function addToCart(product, qty = 1) {
        let existing = cart.find(i => i.id === product.id);
        if (existing) existing.qty += qty;
        else cart.push({ ...product, qty: qty });
        updateCartTotals();
        renderCurrentTab(); // refresh current active tab (pos)
    }

    function completeOrder(paymentMethod) {
        if (cart.length === 0) { showToast("السلة فارغة", "error"); return; }
        let newOrder = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            items: [...cart],
            subtotal: currentSale.subtotal,
            discount: currentSale.discount,
            tax: currentSale.tax,
            total: currentSale.total,
            payment: paymentMethod,
            customer: null
        };
        orders.unshift(newOrder);
        // reduce stock
        cart.forEach(item => {
            let prod = products.find(p => p.id === item.id);
            if (prod) prod.stock = Math.max(0, prod.stock - item.qty);
        });
        cart = [];
        currentSale.discount = 0;
        updateCartTotals();
        showToast(`تمت الفاتورة بنجاح via ${paymentMethod}`, "success");
        renderCurrentTab();
    }

    function showToast(msg, type="info") {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        toast.style.background = type === 'error' ? '#ef4444' : '#7c3aed';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    // ----- Rendering functions for each tab (SPA) -----
    let activeTab = "dashboard";
    let chartInstance = null;

    function renderDashboard() {
        let totalSales = orders.reduce((sum, o) => sum + o.total, 0);
        let totalOrders = orders.length;
        let lowStock = products.filter(p => p.stock < 10).length;
        return `
            <div class="stats-grid">
                <div class="card"><i class="fas fa-chart-simple"></i> <h3>إجمالي المبيعات</h3><p style="font-size:2rem;">${totalSales.toFixed(2)} ريال</p></div>
                <div class="card"><i class="fas fa-receipt"></i> <h3>الطلبات</h3><p style="font-size:2rem;">${totalOrders}</p></div>
                <div class="card"><i class="fas fa-box-open"></i> <h3>منتجات منخفضة</h3><p style="font-size:2rem;">${lowStock}</p></div>
                <div class="card"><i class="fas fa-store"></i> <h3>الفروع النشطة</h3><p style="font-size:2rem;">2</p></div>
            </div>
            <div class="card" style="margin-top:20px;"><canvas id="salesChart" width="400" height="200"></canvas></div>
            <div class="card mt-3"><h3>أحدث الفواتير</h3><table class="data-table"><tr><th>التاريخ</th><th>المبلغ</th><th>الدفع</th></tr>
            ${orders.slice(0,5).map(o => `<tr><td>${o.date}</td><td>${o.total.toFixed(2)}</td><td>${o.payment}</td></tr>`).join('') || '<tr><td colspan="3">لا توجد فواتير بعد</td></tr>'}
            </table></div>
        `;
    }

    function renderPOS() {
        let prodHtml = products.map(p => `
            <div class="product-card" onclick="addToCart({id:${p.id}, name:'${p.name}', price:${p.price}, stock:${p.stock}}, 1)">
                <div style="font-size:2rem;">${p.image}</div>
                <div><strong>${p.name}</strong></div>
                <div>${p.price} ريال</div>
                <small>المخزون: ${p.stock}</small>
            </div>
        `).join('');
        let cartHtml = cart.map(item => `<div class="cart-item"><span>${item.name} x${item.qty}</span><span>${(item.price*item.qty).toFixed(2)} ريال</span><i class="fas fa-trash-alt" style="color:red; cursor:pointer;" onclick="removeFromCart(${item.id})"></i></div>`).join('');
        return `
            <div class="pos-layout">
                <div class="products-grid">${prodHtml}</div>
                <div class="cart-panel">
                    <h3>سلة المبيعات <i class="fas fa-shopping-cart"></i></h3>
                    <div style="max-height:300px; overflow-y:auto;">${cartHtml || '<p>السلة فارغة</p>'}</div>
                    <hr>
                    <div>المجموع: ${currentSale.subtotal.toFixed(2)} ريال</div>
                    <div>الخصم: <input type="number" id="discountInput" value="${currentSale.discount}" style="width:80px; margin-right:8px;" onchange="updateDiscount(this.value)"> ريال</div>
                    <div>الضريبة (15%): ${currentSale.tax.toFixed(2)} ريال</div>
                    <div><strong>الإجمالي: ${currentSale.total.toFixed(2)} ريال</strong></div>
                    <div style="margin-top:15px; display:flex; gap:8px; flex-wrap:wrap;">
                        <button onclick="completeOrder('نقدي')"><i class="fas fa-money-bill"></i> نقدي</button>
                        <button onclick="completeOrder('بطاقة')"><i class="fas fa-credit-card"></i> بطاقة</button>
                        <button onclick="showQRModal()"><i class="fas fa-qrcode"></i> QR الدفع</button>
                    </div>
                    <div id="qrDemoArea" style="margin-top:12px;"></div>
                </div>
            </div>
        `;
    }

    window.removeFromCart = (id) => {
        cart = cart.filter(i => i.id !== id);
        updateCartTotals();
        renderCurrentTab();
    };
    window.updateDiscount = (val) => {
        currentSale.discount = parseFloat(val) || 0;
        updateCartTotals();
        renderCurrentTab();
    };
    window.showQRModal = () => {
        let qrDiv = document.getElementById('qrDemoArea');
        if(qrDiv) qrDiv.innerHTML = `<div class="qr-demo"><i class="fas fa-qrcode" style="font-size: 70px; color:black;"></i><br>ادفع بالـ QR (وهمي)</div><button onclick="document.getElementById('qrDemoArea').innerHTML=''">إغلاق</button>`;
        else showToast("محاكاة QR code", "info");
    };

    function renderProducts() {
        return `
            <div class="card"><h3>إدارة المنتجات</h3><button style="margin-bottom:15px;" onclick="addNewProduct()"><i class="fas fa-plus"></i> منتج جديد</button>
            <table class="data-table"><thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>المخزون</th><th>إجراءات</th></tr></thead><tbody>
            ${products.map(p => `<tr><td>${p.image}</td><td>${p.name}</td><td>${p.price}</td><td>${p.stock}</td><td><button class="btn-outline" onclick="editProduct(${p.id})">تعديل</button> <button style="background:#ef4444;" onclick="deleteProduct(${p.id})">حذف</button></td></tr>`).join('')}
            </tbody></table></div>
        `;
    }

    window.addNewProduct = () => {
        let name = prompt("اسم المنتج");
        let price = parseFloat(prompt("السعر"));
        let stock = parseInt(prompt("الكمية"));
        if(name && price) products.push({ id: Date.now(), name, price, stock, image: "📦" });
        renderCurrentTab();
        showToast("تم إضافة المنتج");
    };
    window.editProduct = (id) => {
        let p = products.find(x=>x.id===id);
        if(p){
            p.name = prompt("اسم جديد", p.name) || p.name;
            p.price = parseFloat(prompt("سعر جديد", p.price)) || p.price;
            p.stock = parseInt(prompt("كمية جديدة", p.stock)) || p.stock;
            renderCurrentTab();
        }
    };
    window.deleteProduct = (id) => {
        if(confirm("حذف المنتج؟")) products = products.filter(p=>p.id!==id);
        renderCurrentTab();
    };

    function renderCustomers() {
        return `<div class="card"><h3>قاعدة العملاء</h3><button onclick="addCustomer()"><i class="fas fa-user-plus"></i> عميل جديد</button>
        <table class="data-table"><tr><th>الاسم</th><th>الهاتف</th><th>إجمالي المشتريات</th><th></th></tr>
        ${customers.map(c => `<tr><td>${c.name}</td><td>${c.phone}</td><td>${c.totalSpent} ريال</td><td><button onclick="viewCustomerOrders(${c.id})">سجل</button></td></tr>`).join('')}
        </table></div>`;
    }
    window.addCustomer = () => { let n=prompt("الاسم"), ph=prompt("الهاتف"); if(n) customers.push({id:Date.now(), name:n, phone:ph, totalSpent:0}); renderCurrentTab(); };
    window.viewCustomerOrders = (id) => { showToast(`طلبات العميل رقم ${id} (تجريبي)`, "info"); };

    function renderReports() {
        let bestProduct = "لا توجد بيانات";
        if(orders.length){
            let salesMap = new Map();
            orders.forEach(order=> order.items.forEach(it=> salesMap.set(it.name, (salesMap.get(it.name)||0)+it.qty));
            if(salesMap.size) bestProduct = [...salesMap.entries()].sort((a,b)=>b[1]-a[1])[0][0];
        }
        return `<div class="stats-grid"><div class="card"><h3>أفضل منتج</h3><p>${bestProduct}</p></div>
        <div class="card"><h3>إجمالي الأرباح</h3><p>${orders.reduce((s,o)=>s+o.total,0).toFixed(2)} ريال</p></div></div>
        <div class="card"><canvas id="monthlyChart" height="150"></canvas></div>`;
    }

    function renderSubscriptions() {
        return `<div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:24px;">
            <div class="plan-card"><h3>مجاني</h3><p>0 ريال/شهر</p><p>50 منتج - مبيعات محدودة</p><button onclick="subscribe('free')">تجربة</button></div>
            <div class="plan-card popular"><h3>Basic</h3><p>49 ريال/شهر</p><p>500 منتج - تقارير أساسية</p><button onclick="subscribe('basic')">اشتراك</button></div>
            <div class="plan-card"><h3>Pro</h3><p>149 ريال/شهر</p><p>غير محدود - دعم فروع - تحليلات متقدمة</p><button onclick="subscribe('pro')">اشتراك</button></div>
            <div class="plan-card"><h3>Enterprise</h3><p>اتصل بنا</p><p>API مخصص - أمان متقدم</p><button onclick="subscribe('enterprise')">تواصل</button></div>
        </div><div class="card mt-3"><p><i class="fas fa-stripe"></i> نظام دفع متكامل مع Stripe (محاكاة). تجربة مجانية لمدة 14 يوم.</p></div>`;
    }
    window.subscribe = (plan) => showToast(`تم اختيار خطة ${plan}، سيتم تحويلك إلى بوابة الدفع (محاكاة SaaS)`, "success");

    function renderSettings() {
        return `<div class="card"><h3>إعدادات المتجر</h3><label>اسم المتجر: <input type="text" id="storeName" placeholder="مقهى السحابة"></label><br><label>تعدد الفروع: <input type="checkbox" id="multiBranch"> تفعيل</label><br><label>الصلاحيات: Admin, Owner, Employee</label><br><button onclick="saveSettings()">حفظ الإعدادات</button><div class="mt-3"><i class="fas fa-shield-alt"></i> مستوى أمان عالي / JWT وهمي</div></div>`;
    }
    window.saveSettings = () => { showToast("تم حفظ الإعدادات (محاكاة)", "info"); };

    // Chart helpers
    function initChart() {
        let ctx = document.getElementById('salesChart')?.getContext('2d');
        if(ctx && chartInstance) chartInstance.destroy();
        if(ctx) chartInstance = new Chart(ctx, { type: 'line', data: { labels: ['أسبوع1','أسبوع2','أسبوع3','أسبوع4'], datasets: [{ label: 'المبيعات', data: [120,450,300,680], borderColor: '#7c3aed' }] } });
        let monthCtx = document.getElementById('monthlyChart')?.getContext('2d');
        if(monthCtx) new Chart(monthCtx, { type: 'bar', data: { labels: ['يناير','فبراير','مارس'], datasets: [{ label: 'الإيرادات', data: [1200,1900,2400] }] } });
    }

    function renderCurrentTab() {
        let container = document.getElementById('contentPane');
        if(activeTab === 'dashboard') container.innerHTML = renderDashboard();
        else if(activeTab === 'pos') container.innerHTML = renderPOS();
        else if(activeTab === 'products') container.innerHTML = renderProducts();
        else if(activeTab === 'customers') container.innerHTML = renderCustomers();
        else if(activeTab === 'reports') container.innerHTML = renderReports();
        else if(activeTab === 'subscriptions') container.innerHTML = renderSubscriptions();
        else if(activeTab === 'settings') container.innerHTML = renderSettings();
        document.getElementById('pageTitle').innerText = {
            dashboard:'لوحة التحكم', pos:'نقطة البيع', products:'المنتجات', customers:'العملاء', reports:'التقارير', subscriptions:'الاشتراكات', settings:'الإعدادات'
        }[activeTab] || 'CloudPOS';
        if(activeTab === 'dashboard' || activeTab === 'reports') setTimeout(initChart, 50);
        if(activeTab === 'pos') {
            // reattach discount input events already global
        }
    }

    // Event listeners & sidebar
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            activeTab = item.getAttribute('data-tab');
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');
            renderCurrentTab();
            if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
        });
    });

    document.getElementById('darkModeToggle').addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    });
    if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

    document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });
    document.getElementById('notifBtn').addEventListener('click', () => {
        showToast("🔔 لديك 3 إشعارات جديدة: منتج منخفض، فاتورة جديدة.", "info");
    });

    // startup
    renderCurrentTab();
    // close sidebar on click outside if needed
    document.addEventListener('click', (e) => {
        let sidebar = document.getElementById('sidebar');
        if(window.innerWidth <= 768 && !sidebar.contains(e.target) && !e.target.closest('.menu-toggle')) {
            sidebar.classList.remove('open');
        }
    });
    // Update stock warning demo
    setInterval(() => {
        let low = products.filter(p=>p.stock<5).length;
        if(low>0 && activeTab!='pos') showToast(`⚠️ تنبيه: ${low} منتج على وشك النفاد`, "error");
    }, 30000);
</script>
</body>
</html>
