var GRM=["كانون الثاني","شباط","آذار","نيسان","أيار","حزيران","تموز","آب","أيلول","تشرين الأول","تشرين الثاني","كانون الأول"];
var HJM=["محرم","صفر","ربيع الأول","ربيع الثاني","جمادى الأولى","جمادى الآخرة","رجب","شعبان","رمضان","شوال","ذو القعدة","ذو الحجة"];
var ARD=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
var DIM=[31,28,31,30,31,30,31,31,30,31,30,31];

function toHijri(gy,gm1,gd){
  var jd=Math.floor((1461*(gy+4800+Math.floor((gm1-14)/12)))/4)+Math.floor((367*(gm1-2-12*Math.floor((gm1-14)/12)))/12)-Math.floor((3*Math.floor((gy+4900+Math.floor((gm1-14)/12))/100))/4)+gd-32075;
  jd-=2;// تصحيح: مُعاير على 13 مارس 2026 = 24 رمضان 1447هـ
  var l=jd-1948440+10632;var n=Math.floor((l-1)/10631);l=l-10631*n+354;
  var j=Math.floor((10985-l)/5316)*Math.floor(50*l/17719)+Math.floor(l/5670)*Math.floor(43*l/15238);
  l=l-Math.floor((30-j)/15)*Math.floor(17719*j/50)-Math.floor(j/16)*Math.floor(15238*j/43)+29;
  var hm=Math.floor(24*l/709),hd=l-Math.floor(709*hm/24),hy=30*n+j-30;
  return{hy:hy,hm:hm,hd:hd};
}

var RAM_DAYS=[];
for(var _i=0;_i<11;_i++) RAM_DAYS.push({month:1,day:18+_i});
for(var _i=0;_i<19;_i++) RAM_DAYS.push({month:2,day:_i+1});
var RAM_MONTHS=new Set(RAM_DAYS.map(function(r){return r.month;}));

function isRamDay(m,d){return RAM_DAYS.some(function(r){return r.month===m&&r.day===d;});}
function ramDayNum(m,d){var i=RAM_DAYS.findIndex(function(r){return r.month===m&&r.day===d;});return i===-1?null:i+1;}

function n(v){return parseFloat(String(v||'').replace(/[^0-9.]/g,''))||0;}
function fmt(v){if(v===0)return '—';return v.toLocaleString('ar',{maximumFractionDigits:2});}
function sumC(list,cur){return list.reduce(function(s,e){return s+n(e[cur]);},0);}
var ER={try:'32',syp:'13000'};

function cvt(amt,from,rates){
  var tryR=n(rates.try)||32,sypR=n(rates.syp)||13000;
  var usd=from==='USD'?amt:from==='TRY'?amt/tryR:amt/sypR;
  return{usd:usd.toFixed(4),try:(usd*tryR).toFixed(2),syp:Math.round(usd*sypR).toString()};
}

/* Safe math */
function safeMath(raw){
  var s=raw.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').trim();
  if(!s)return null; var i=0;
  function peek(){return s[i]||'';}
  function eat(){return s[i++];}
  function E(){var v=T();while(peek()==='+'){{eat();v+=T();}}while(peek()==='-'){{eat();v-=T();}}return v;}
  function T(){var v=F();while(peek()==='*'||peek()==='/'){var op=eat();var r=F();v=op==='*'?v*r:v/r;}return v;}
  function F(){if(peek()==='-'){eat();return -F();}if(peek()==='('){eat();var v=E();eat();return v;}var num='';while(/[0-9.]/.test(peek()))num+=eat();return num?parseFloat(num):0;}
  try{var r=E();return isFinite(r)?parseFloat(r.toFixed(10)):null;}catch(e){return null;}
}

/* ══════════════════════════════════════
   STORAGE: localStorage + IndexedDB backup
══════════════════════════════════════ */
var _IDB=null,_IDB_KEYS=['hb_expenses','hb_rates','hb_sticky','hb_spender','hb_rate_ts','hb_income','hb_debts','hb_sync_id','hb_sync_code','hb_dhikr_ts','hb_dhikr_idx','hb_uid','hb_auto_blob'];
function _openIDB(cb){
  if(_IDB){cb(_IDB);return;}
  try{
    var r=indexedDB.open('masroof_bayti',1);
    r.onupgradeneeded=function(e){e.target.result.createObjectStore('kv');};
    r.onsuccess=function(e){_IDB=e.target.result;cb(_IDB);};
    r.onerror=function(){cb(null);};
  }catch(e){cb(null);}
}
function idbSet(k,v){
  _openIDB(function(db){
    if(!db)return;
    try{db.transaction('kv','readwrite').objectStore('kv').put(v,k);}catch(e){}
  });
}
function idbGet(k,cb){
  _openIDB(function(db){
    if(!db){cb(null);return;}
    try{
      var r=db.transaction('kv','readonly').objectStore('kv').get(k);
      r.onsuccess=function(){cb(r.result!==undefined?r.result:null);};
      r.onerror=function(){cb(null);};
    }catch(e){cb(null);}
  });
}
function idbRestoreAll(cb){
  // استرجاع كل البيانات من IndexedDB لـ localStorage
  _openIDB(function(db){
    if(!db){cb();return;}
    var done=0,total=_IDB_KEYS.length;
    _IDB_KEYS.forEach(function(k){
      try{
        var r=db.transaction('kv','readonly').objectStore('kv').get(k);
        r.onsuccess=function(){
          if(r.result!==null&&r.result!==undefined){
            try{localStorage.setItem(k,r.result);}catch(e){}
          }
          if(++done>=total)cb();
        };
        r.onerror=function(){if(++done>=total)cb();};
      }catch(e){if(++done>=total)cb();}
    });
  });
}
function lsGet(key){try{var v=localStorage.getItem(key);return v!==null?v:null;}catch(e){return null;}}
function lsSet(key,val){
  try{localStorage.setItem(key,val);}catch(e){}
  idbSet(key,val);// نسخة احتياطية في IndexedDB
}

/* تسجيل Service Worker للعمل بدون انترنت */
function _registerSW(){
  if(!('serviceWorker' in navigator))return;
  var appUrl=location.href.split('?')[0].split('#')[0];
  // حفظ الصفحة في Cache API مباشرة
  if('caches' in window){
    caches.open('masroof-bayti-v3').then(function(c){
      c.match(appUrl).then(function(r){
        if(!r)c.add(appUrl).catch(function(){});
      });
    }).catch(function(){});
  }
  // تسجيل SW من blob
  try{
    var swCode=[
      'var C="masroof-v3",U="'+appUrl+'";',
      'self.addEventListener("install",function(e){',
      '  e.waitUntil(caches.open(C).then(function(c){return c.add(U).catch(function(){});}));',
      '  self.skipWaiting();',
      '});',
      'self.addEventListener("activate",function(e){',
      '  e.waitUntil(caches.keys().then(function(ks){',
      '    return Promise.all(ks.filter(function(k){return k!==C;}).map(function(k){return caches.delete(k);}));',
      '  }));',
      '  self.clients.claim();',
      '});',
      'self.addEventListener("fetch",function(e){',
      '  if(e.request.mode==="navigate"||e.request.url===U){',
      '    e.respondWith(caches.match(U).then(function(r){return r||fetch(e.request);}));',
      '    return;',
      '  }',
      '  e.respondWith(fetch(e.request).catch(function(){return caches.match(e.request);}));',
      '});'
    ].join('');
    var blob=new Blob([swCode],{type:'application/javascript'});
    var blobUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(blobUrl,{scope:'./'})
      .then(function(){URL.revokeObjectURL(blobUrl);})
      .catch(function(){URL.revokeObjectURL(blobUrl);});
  }catch(e){}
}
window.addEventListener('load',function(){setTimeout(_registerSW,2000);});

  view:'loading',

  selDay:null,

/* ══════════════════════════════════════
   SYNC ENGINE (jsonblob.com)
══════════════════════════════════════ */
var SYNC={
  blobId: null,    // full blob ID
  code:   null,    // 8-char share code shown to user
  status: 'off',   // off | syncing | ok | err
  lastSync: 0,
  pollTimer: null,
  isHost: false,   // true = created the room
};
var BLOB_API='https://jsonblob.com/api/jsonBlob';
var NPOINT_API='https://api.npoint.io';

/* ══════════════════════════════════════
   ADMIN SYSTEM + USER ID
══════════════════════════════════════ */
// ⚠️ غيّر هذه الكلمة السرية — الأدمن فقط يعرفها
var ADMIN_KEY='770389';

function generateUID(){
  var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var uid='HB-';
  for(var i=0;i<6;i++) uid+=chars[Math.floor(Math.random()*chars.length)];
  return uid;
}
function getOrCreateUID(){
  var uid=lsGet('hb_uid');
  if(!uid){uid=generateUID();lsSet('hb_uid',uid);}
  return uid;
}

// مزامنة تلقائية صامتة — مستقلة عن نظام SYNC
var AUTO_BLOB=null;
function autoSyncInit(){
  var blobId=lsGet('hb_auto_blob');
  if(blobId){AUTO_BLOB=blobId;return;}
  // أنشئ blob جديد للمستخدم
  var uid=getOrCreateUID();
  var payload=buildAutoPayload(uid);
  fetch(NPOINT_API,{method:'POST',mode:'cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(data){
      if(data&&data.id){AUTO_BLOB=data.id;lsSet('hb_auto_blob',data.id);}
    }).catch(function(){});
}
function buildAutoPayload(uid){
  return {
    uid:uid||getOrCreateUID(),
    spender:STATE.spender,
    income:STATE.income,
    rates:STATE.rates,
    debts:STATE.debts,
    expenses:STATE.expenses,
    v:Date.now()
  };
}
var _autoTimer=null;
function autoSyncPush(){
  if(_autoTimer)clearTimeout(_autoTimer);
  _autoTimer=setTimeout(function(){
    if(!AUTO_BLOB)return;
    var uid=getOrCreateUID();
    fetch(NPOINT_API+'/'+AUTO_BLOB,{method:'PUT',mode:'cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(buildAutoPayload(uid))})
      .catch(function(){});
  },1500);
}

function syncStatus(s,msg){
  SYNC.status=s;
  var el=document.getElementById('sync-status-dot');
  var ml=document.getElementById('sync-status-msg');
  if(el){
    var colors={off:'#566078',syncing:'#FBB924',ok:'#4ADE80',err:'#EF5350'};
    el.style.background=colors[s]||'#566078';
    if(s==='syncing'){el.style.animation='syncPulse 0.8s ease-in-out infinite';}
    else{el.style.animation='none';}
  }
  if(ml&&msg)ml.textContent=msg;
}

function buildSyncPayload(){
  return {
    expenses: STATE.expenses,
    rates:    STATE.rates,
    income:   STATE.income,
    spender:  STATE.spender,
    debts:    STATE.debts,
    v:        Date.now()
  };
}

function applySyncPayload(data){
  if(!data||typeof data!=='object')return;
  // Merge expenses: remote wins per-day if remote timestamp newer
  if(data.expenses) STATE.expenses=data.expenses;
  if(data.debts) STATE.debts=data.debts;
  if(data.rates)    STATE.rates=data.rates;
  if(data.income)   STATE.income=data.income;
  if(data.spender&&!STATE.spender) STATE.spender=data.spender;
  // Persist locally
  lsSet('hb_expenses',JSON.stringify(STATE.expenses));
  lsSet('hb_rates',JSON.stringify(STATE.rates));
  lsSet('hb_income',JSON.stringify(STATE.income));
  if(data.spender&&!lsGet('hb_spender')) lsSet('hb_spender',data.spender);
  syncSession();
}

function codeFromId(id){
  // Take last 8 chars, uppercase → human-friendly code
  return String(id).replace(/\D/g,'').slice(-8);
}

// ── Create new room ──
function syncCreate(){
  syncStatus('syncing','جارٍ إنشاء الغرفة...');
  renderModal();
  var payload=buildSyncPayload();
  // نستخدم npoint.io — مجاني، يدعم CORS من file://
  fetch(NPOINT_API,{
    method:'POST',
    mode:'cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(data){
    var id=data.id||data._id||'';
    if(!id) throw new Error('no id returned');
    SYNC.blobId=id;
    SYNC.code=id;
    SYNC.isHost=true;
    SYNC.lastSync=Date.now();
    lsSet('hb_sync_id',id);
    lsSet('hb_sync_code',id);
    syncStatus('ok','متزامن ✓');
    startPoll();
    openModal('syncCode');
  }).catch(function(err){
    console.error('syncCreate error:',err);
    syncStatus('err','تعذّر الاتصال — تأكد من الإنترنت');
    renderModal();
    setTimeout(function(){
      var el=document.getElementById('sync-err-msg');
      if(el){el.textContent='⚠️ '+err.message;el.style.display='';}
    },100);
  });
}

// ── Join existing room ──
function syncJoin(code){
  // code = 8-digit number that ends the blob ID
  // We need to find the full ID — the user must share the full code (which IS the numeric suffix)
  // jsonblob IDs are long numbers; our "code" IS the full ID
  syncStatus('syncing','جارٍ الاتصال...');
  var id=code.trim();
  fetch(BLOB_API+'/'+id,{headers:{'Accept':'application/json'}})
    .then(function(r){if(!r.ok)throw new Error('not found');return r.json();})
    .then(function(data){
      SYNC.blobId=id;
      SYNC.code=codeFromId(id);
      SYNC.isHost=false;
      SYNC.lastSync=Date.now();
      lsSet('hb_sync_id',id);
      lsSet('hb_sync_code',SYNC.code);
      applySyncPayload(data);
      syncStatus('ok','متصل ✓');
      startPoll();
      STATE.modal=null;
      render();
    }).catch(function(){syncStatus('err','الكود غير صحيح');renderModal();});
}

// ── Push local data to cloud (debounced) ──
var _pushTimer=null;
function syncPush(cb){
  if(!SYNC.blobId)return;
  if(_pushTimer)clearTimeout(_pushTimer);
  _pushTimer=setTimeout(function(){_doPush(cb);},800);
}
function _doPush(cb){
  if(!SYNC.blobId)return;
  syncStatus('syncing','جارٍ الرفع...');
  fetch(NPOINT_API+'/'+SYNC.blobId,{
    method:'PUT',
    mode:'cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(buildSyncPayload())
  }).then(function(r){
    if(!r.ok)throw new Error('push failed');
    SYNC.lastSync=Date.now();
    syncStatus('ok','متزامن ✓');
    if(cb)cb();
  }).catch(function(){syncStatus('err','فشل الرفع');});
}

// ── Pull remote data ──
function syncPull(silent){
  if(!SYNC.blobId)return;
  if(!silent)syncStatus('syncing','جارٍ التحديث...');
  fetch(NPOINT_API+'/'+SYNC.blobId,{mode:'cors'})
    .then(function(r){if(!r.ok)throw new Error('pull failed');return r.json();})
    .then(function(data){
      // only apply if remote is newer
      if(!data.v||data.v>SYNC.lastSync+2000){
        applySyncPayload(data);
        SYNC.lastSync=Date.now();
        if(STATE.view==='months'||STATE.view==='days'||STATE.view==='day') render();
        else render();
      }
      syncStatus('ok','متزامن ✓');
    }).catch(function(){if(!silent)syncStatus('err','فشل التحديث');});
}

// ── Auto-poll every 30s ──
function startPoll(){
  if(SYNC.pollTimer)clearInterval(SYNC.pollTimer);
  SYNC.pollTimer=setInterval(function(){syncPull(true);},30000);
}

function saveDebts(){lsSet('hb_debts',JSON.stringify(STATE.debts));if(SYNC&&SYNC.blobId)syncPush();autoSyncPush();}

function doDebtAction(scope){
  // scope: 'all' = حذف من الجميع | 'list' = حذف من القائمة فقط
  var id=STATE.debtConfirmId;
  var type=STATE.debtConfirmType;
  if(type==='paid'){
    STATE.debts.forEach(function(d){if(d.id===id)d.paid=true;});
  } else if(type==='delete'){
    var debt=STATE._deletingDebt||{};
    STATE.debts=STATE.debts.filter(function(d){return d.id!==id;});
    // حذف من الأيام فقط إذا اختار "حذف من الجميع"
    if(scope==='all'&&debt.name){
      Object.keys(STATE.expenses).forEach(function(dayKey){
        STATE.expenses[dayKey]=STATE.expenses[dayKey].filter(function(e){
          var sameName=e.name===debt.name;
          var sameType=e.type==='debt';
          var sameAmt=Math.abs(parseFloat(e.usd||0)-parseFloat(debt.usd||0))<0.01;
          return !(sameName&&sameType&&sameAmt);
        });
      });
      saveExpenses();
      syncSession();
    }
  }
  STATE.debtConfirmId=null;
  STATE.debtConfirmType=null;
  STATE._deletingDebt=null;
  saveDebts();
  closeModal();
  render();
}

function saveDebt(){
  var name=(document.getElementById('db-name')||{}).value||'';
  if(!name.trim()){alert('الرجاء إدخال اسم الدين');return;}
  var tryV=(document.getElementById('db-try')||{}).value||'0';
  var usdV=(document.getElementById('db-usd')||{}).value||'0';
  var sypV=(document.getElementById('db-syp')||{}).value||'0';
  var rSnap=cvt(1,'USD',STATE.rates);
  var dateStr=activeDateLabel();
  var debt={
    id:Date.now(),
    name:name.trim(),
    note:(document.getElementById('db-note')||{}).value||'',
    try:parseFloat(tryV)||0,
    usd:parseFloat(usdV)||0,
    syp:parseFloat(sypV)||0,
    rateSnap:rSnap,
    date:dateStr,
    paid:false
  };
  STATE.debts.push(debt);
  saveDebts();
  // ── إضافة الدين أيضاً لمصروفات اليوم ──
  var expEntry={
    id:Date.now()+2,
    name:debt.name,
    note:debt.note||'',
    type:'debt',
    try:String(debt.try),
    usd:String(debt.usd),
    syp:String(debt.syp),
    rateSnap:{try:STATE.rates.try,syp:STATE.rates.syp}
  };
  var aKey2=activeKey();
  if(!STATE.expenses[aKey2])STATE.expenses[aKey2]=[];
  STATE.expenses[aKey2].push(expEntry);
  saveExpenses();
  syncSession();
  closeModal();
  render();
}

function importFromText(){
  var txt=((document.getElementById('import-text-inp')||{}).value||'').trim();
  if(!txt){alert('الرجاء لصق النص أولاً');return;}
  try{
    var data=JSON.parse(txt);
    if(!data||data.app!=='masroof-bayti'){alert('البيانات غير صالحة!');return;}
    var keys=['hb_expenses','hb_rates','hb_income','hb_spender','hb_debts','hb_rate_ts','hb_sticky'];
    keys.forEach(function(k){if(data[k]!=null)lsSet(k,data[k]);});
    alert('✅ تم استيراد البيانات!\nسيتم إعادة تحميل التطبيق.');
    location.reload();
  }catch(ex){alert('❌ خطأ: '+ex.message);}
}
function importData(input){
  var file=input.files&&input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data||data.app!=='masroof-bayti'){alert('الملف غير صالح!');return;}
      var keys=['hb_expenses','hb_rates','hb_income','hb_spender','hb_debts','hb_rate_ts','hb_sticky'];
      keys.forEach(function(k){if(data[k]!=null)lsSet(k,data[k]);});
      alert('✅ تم استيراد البيانات بنجاح!\nسيتم إعادة تحميل التطبيق.');
      location.reload();
    }catch(ex){alert('❌ خطأ في قراءة الملف: '+ex.message);}
  };
  reader.readAsText(file);
  input.value='';
}

function shareApp(){
  var url=window.location.href;
  var text='📱 تطبيق مصروف البيت\nتطبيق مجاني لتسجيل المصروف اليومي مع عائلتك\n'+url;
  if(navigator.share){
    navigator.share({title:'مصروف البيت',text:text,url:url}).catch(function(){});
  } else {
    // fallback: copy
    if(navigator.clipboard){navigator.clipboard.writeText(text);}
    else{var t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}
    alert('تم نسخ رابط التطبيق!');
  }
}

function copyCode(){
  var code=SYNC.blobId||'';
  if(navigator.clipboard){navigator.clipboard.writeText(code);}
  else{var t=document.createElement('textarea');t.value=code;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}
  alert('تم نسخ الكود!');
}
function doJoin(){
  var code=(document.getElementById('inp-join-code')||{}).value||'';
  if(!code.trim()){return;}
  var errEl=document.getElementById('sync-err');
  // override syncJoin to show error in modal
  syncStatus('syncing','جارٍ الاتصال...');
  fetch(NPOINT_API+'/'+code.trim(),{mode:'cors'})
    .then(function(r){if(!r.ok)throw new Error('not found');return r.json();})
    .then(function(data){
      SYNC.blobId=code.trim();
      SYNC.code=codeFromId(code.trim());
      SYNC.isHost=false;
      SYNC.lastSync=Date.now();
      lsSet('hb_sync_id',code.trim());
      lsSet('hb_sync_code',SYNC.code);
      applySyncPayload(data);
      syncStatus('ok','متصل ✓');
      startPoll();
      STATE.modal=null;
      render();
    }).catch(function(){
      syncStatus('err','الكود غير صحيح');
      if(errEl)errEl.style.display='';
    });
}
function disconnectSync(){
  if(SYNC.pollTimer)clearInterval(SYNC.pollTimer);
  SYNC.blobId=null;SYNC.code=null;SYNC.status='off';SYNC.isHost=false;
  lsSet('hb_sync_id','');lsSet('hb_sync_code','');
  closeModal();
}

/* ══════════════════════════════════════
   TRIAL + ACTIVATION SYSTEM (محلي 100%)
   - 30 يوم تجربة مجانية من أول تشغيل
   - بعدها: شاشة كود التفعيل
   - الكود يُحسب من UID بدون server
══════════════════════════════════════ */

// مفتاح سري — لا تشاركه مع أحد
var CODE_SECRET='Alhloo_HB_2025_Secret';
var CHARS32='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
var CODES_BLOB_KEY='hb_codes_blob';// معرّف blob الأكواد
var TRIAL_DAYS=30;

/* ══════════════════════════════════════
   نظام الأكواد الجديد:
   - الأدمن ينشئ كوداً بمدة محددة بدون UID
   - الكود: NONCE(6) + DAYS(3) + CHECK(3) = 12 حرف → XXXX-XXXX-XXXX
   - التحقق من "مستخدم مرة واحدة" عبر npoint.io
   - بعد التفعيل يعمل بدون نت
══════════════════════════════════════ */

function _n2s(n,len){var s='';for(var i=0;i<len;i++){s=CHARS32[n%32]+s;n=Math.floor(n/32);}return s;}
function _s2n(s){var n=0;for(var i=0;i<s.length;i++){var x=CHARS32.indexOf(s[i]);if(x<0)return -1;n=n*32+x;}return n;}

// بصمة 3 أحرف للتحقق
function _check3(nonce,daysStr,secret){
  var raw=nonce+'|'+daysStr+'|'+secret;
  var h=0;for(var i=0;i<raw.length;i++){h=((h<<5)-h)+raw.charCodeAt(i);h=h&h;}
  var pos=Math.abs(h);
  var out='';var tmp=pos;
  for(var j=0;j<3;j++){out+=CHARS32[tmp%32];tmp=Math.floor(tmp/32)+j*13+1;}
  return out;
}

// توليد nonce عشوائي 6 أحرف
function _genNonce(){
  var s='';
  for(var i=0;i<6;i++)s+=CHARS32[Math.floor(Math.random()*32)];
  return s;
}

// بناء كود كامل
function buildVoucher(days){
  var nonce=_genNonce();
  var dStr=_n2s(Math.max(1,Math.min(9999,days)),3);
  var chk=_check3(nonce,dStr,CODE_SECRET);
  var raw=nonce+dStr+chk;// 12 حرف
  return raw.slice(0,4)+'-'+raw.slice(4,8)+'-'+raw.slice(8,12);
}

// استخراج بيانات الكود (nonce + days) أو null إذا تالف
function parseVoucher(code){
  var c=code.replace(/-/g,'').toUpperCase();
  if(c.length!==12)return null;
  var nonce=c.slice(0,6);
  var dStr=c.slice(6,9);
  var chk=c.slice(9,12);
  if(_check3(nonce,dStr,CODE_SECRET)!==chk)return null;
  var days=_s2n(dStr);
  if(days<=0)return null;
  return {nonce:nonce,days:days};
}

/* ══════════════════════════════════════
   Blob الأكواد على npoint.io
   بنية: { "NONCE": { days, created, usedBy:"UID"|null, usedAt:timestamp|null } }
══════════════════════════════════════ */
var _codesBlobId=null;

function getCodesBlobId(){
  if(_codesBlobId)return _codesBlobId;
  var id=lsGet(CODES_BLOB_KEY);
  if(id&&!id.startsWith('HB-')){_codesBlobId=id;}
  return _codesBlobId;
}
// ── Local codes store (localStorage) ──
function _getLocalCodes(){
  try{var v=lsGet('hb_local_codes');return v?JSON.parse(v):{};}catch(e){return {};}
}
function _saveLocalCodes(data){
  lsSet('hb_local_codes',JSON.stringify(data));
}
// دمج الأكواد المحلية مع الـ Blob (local يكون المرجع الأساسي)
function _mergeLocalWithBlob(blob){
  var local=_getLocalCodes();
  var merged=Object.assign({},blob||{},local);
  return merged;
}

function _fetchCodesBlob(cb){
  // نبدأ دائماً من الـ local
  var local=_getLocalCodes();
  var id=getCodesBlobId();
  if(!id){cb(Object.keys(local).length>0?local:null);return;}
  fetch(NPOINT_API+'/'+id,{mode:'cors'})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(remote){
      // دمج remote مع local (local يغلب)
      var merged=_mergeLocalWithBlob(remote);
      cb(merged);
    }).catch(function(){
      // عند فشل الاتصال نستخدم local فقط
      cb(Object.keys(local).length>0?local:null);
    });
}
function _pushCodesBlob(data,cb){
  // احفظ دائماً في local أولاً
  _saveLocalCodes(data);
  var id=getCodesBlobId();
  if(!id){if(cb)cb(true);return;}// local only — ok
  fetch(NPOINT_API+'/'+id,{method:'PUT',mode:'cors',
    headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){if(cb)cb(r.ok);}).catch(function(){if(cb)cb(false);});
}
function createCodesBlob(cb){
  fetch(NPOINT_API,{method:'POST',mode:'cors',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({_created:Date.now()})})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){
      if(d&&d.id){
        _codesBlobId=d.id;
        lsSet(CODES_BLOB_KEY,d.id);
        cb(d.id);
      } else cb(null);
    }).catch(function(){cb(null);});
}

function getLicenseStatus(){
  var uid=getOrCreateUID();
  var regRaw=lsGet('hb_reg_date');
  if(!regRaw){var now=Date.now();lsSet('hb_reg_date',now.toString());regRaw=now.toString();}
  var regDate=parseInt(regRaw);

  // كود مفعّل محفوظ محلياً؟
  var savedNonce=lsGet('hb_act_nonce')||'';
  var savedDays=parseInt(lsGet('hb_act_days')||'0');
  var savedActDate=parseInt(lsGet('hb_act_date')||'0');
  if(savedNonce&&savedDays>0&&savedActDate>0){
    var daysUsed=Math.floor((Date.now()-savedActDate)/86400000);
    if(daysUsed<savedDays){
      return {status:'licensed',uid:uid,daysLeft:savedDays-daysUsed,totalDays:savedDays};
    }
    // انتهت مدة الكود
    lsSet('hb_act_nonce','');lsSet('hb_act_days','0');lsSet('hb_act_date','0');
    return {status:'expired',uid:uid};
  }

  // فترة التجربة
  var trialUsed=Math.floor((Date.now()-regDate)/86400000);
  if(trialUsed<TRIAL_DAYS){
    return {status:'trial',uid:uid,daysLeft:TRIAL_DAYS-trialUsed};
  }
  return {status:'expired',uid:uid};
}

/* إدخال الكود من قِبل المستخدم */
function submitAccessCode(){
  var raw=((document.getElementById('access-code-inp')||{}).value||'').trim().toUpperCase();
  var uid=getOrCreateUID();
  var parsed=parseVoucher(raw);

  var errEl=document.getElementById('code-err');
  var btnEl=document.getElementById('act-btn');

  if(!parsed){
    if(errEl){errEl.textContent='❌ الكود غير صحيح';errEl.style.display='';}
    return;
  }

  // تحقق عبر npoint من أن الكود لم يُستخدم
  if(btnEl){btnEl.textContent='⏳ جارٍ التحقق...';btnEl.disabled=true;}

  // فحص local أولاً (أسرع وبدون نت)
  var _localBlob=_getLocalCodes();
  var _hasLocal=_localBlob&&_localBlob[parsed.nonce];
  _fetchCodesBlob(function(blob){
    if(!blob){
      if(_hasLocal){blob=_localBlob;}
      else{
        _activateLocally(uid,parsed,raw,errEl,btnEl,true);
        return;
      }
    }
    var entry=blob[parsed.nonce];
    if(!entry){
      // الكود غير موجود في قائمة الأكواد
      if(errEl){errEl.textContent='❌ هذا الكود غير صالح';errEl.style.display='';}
      if(btnEl){btnEl.textContent='تفعيل ✓';btnEl.disabled=false;}
      return;
    }
    if(entry.usedBy&&entry.usedBy!==uid){
      // مستخدم على جهاز آخر
      if(errEl){errEl.textContent='⚠️ هذا الكود تم استخدامه مسبقاً على جهاز آخر';errEl.style.display='';}
      if(btnEl){btnEl.textContent='تفعيل ✓';btnEl.disabled=false;}
      return;
    }
    if(entry.expiresAt&&Date.now()>entry.expiresAt){
      if(errEl){errEl.textContent='⏳ صلاحية هذا الكود منتهية';errEl.style.display='';}
      if(btnEl){btnEl.textContent='تفعيل ✓';btnEl.disabled=false;}
      return;
    }
    // الكود صالح — سجّل الاستخدام
    blob[parsed.nonce].usedBy=uid;
    blob[parsed.nonce].usedAt=Date.now();
    _pushCodesBlob(blob,function(){});
    _activateLocally(uid,parsed,raw,errEl,btnEl,false);
  });
}

  lsSet('hb_act_nonce',parsed.nonce);
  lsSet('hb_act_days',String(parsed.days));
  lsSet('hb_act_date',String(Date.now()));
  var scr=document.getElementById('access-code-screen');

function adminCreateCodesBlob(){
  // ارفع الأكواد المحلية الموجودة مع الـ Blob الجديد
  var localData=_getLocalCodes();
  var initData=Object.assign({_created:Date.now()},localData);
  fetch(NPOINT_API,{method:'POST',mode:'cors',
    headers:{'Content-Type':'application/json'},body:JSON.stringify(initData)})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){
      if(d&&d.id){
        _codesBlobId=d.id;
        lsSet(CODES_BLOB_KEY,d.id);
        STATE._codesBlob=initData;
        alert('✅ تم إنشاء Codes Blob! المعرف: '+d.id+' (احفظه)');
        renderModal();
      } else alert('❌ فشل الإنشاء — تأكد من الإنترنت');
    }).catch(function(){alert('❌ خطأ في الاتصال');});
}
function adminSetCodesBlob(){
  var id=((document.getElementById('admin-cb-inp')||{}).value||'').trim();
  if(!id)return;
  _codesBlobId=id;
  lsSet(CODES_BLOB_KEY,id);

function adminCopyCodesBlob(){
  var id=getCodesBlobId()||'';
  if(!id)return;
  if(navigator.clipboard)navigator.clipboard.writeText(id);
  else{var t=document.createElement('textarea');t.value=id;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}
  alert('تم النسخ: '+id);
}

══════════════════════════════════════ */
function renderCalc(){
  var el=document.getElementById('calc-layer');
  if(!el){el=document.createElement('div');el.id='calc-layer';document.getElementById('app').appendChild(el);}
  if(STATE.view==='loading'){el.innerHTML='';return;}

  var rows=[['C','±','%','÷'],['7','8','9','×'],['4','5','6','−'],['1','2','3','+'],['0','.','⌫','=']];
  var display=STATE.calcResult||STATE.calcExpr||'0';

  // If panel already open → only update display text (no flicker)
  var exprEl=document.getElementById('calc-expr-disp');
  var numEl =document.getElementById('calc-num-disp');
  if(STATE.calcOpen && exprEl && numEl){
    exprEl.textContent=STATE.calcExpr||'';
    numEl.textContent=display;
    numEl.style.color=STATE.calcResult?'#4ADE80':TB.text;
    return;
  }

  var calcHtml='';
  if(STATE.calcOpen){
    calcHtml='<div id="calc-panel" style="position:fixed;bottom:90px;right:14px;z-index:9001;width:264px;background:'+TB.hdrBg+';border:2px solid '+TB.border2+';border-radius:20px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.6)">'+
      '<div style="background:'+(IS_DAY?'#e8eeff':'#050810')+';padding:14px 14px 10px;text-align:right">'+
      '<div id="calc-expr-disp" style="font-size:11px;color:'+TB.textMuted+';min-height:16px;margin-bottom:2px;direction:ltr;text-align:right;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+(STATE.calcExpr||'')+'</div>'+
      '<div id="calc-num-disp" style="font-size:36px;font-weight:900;color:'+(STATE.calcResult?'#4ADE80':TB.text)+';line-height:1;direction:ltr;text-align:right">'+escHtml(display)+'</div></div>'+
      '<div style="padding:7px 8px 10px;display:flex;flex-direction:column;gap:5px">';
    rows.forEach(function(row){
      calcHtml+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px">';
      row.forEach(function(v){
        var isOp=['÷','×','−','+'].includes(v);
        var isEq=v==='=',isC=v==='C',isDel=v==='⌫';
        calcHtml+='<button onclick="calcPress(\''+v+'\')" style="height:50px;border-radius:11px;border:none;font-family:\'Cairo\',sans-serif;font-weight:900;font-size:'+(isEq?22:isDel?16:15)+'px;cursor:pointer;background:'+(isEq?'linear-gradient(135deg,'+TB.blue+','+TB.blueDim+')':isOp?'rgba(79,142,247,.18)':isC?'rgba(239,68,68,.18)':(IS_DAY?'#EEF2FB':'#1E2640'))+';color:'+(isEq?'#fff':isOp?TB.blue:isC?'#EF5350':isDel?'#FB923C':TB.text)+';box-shadow:'+(isEq?'0 3px 12px '+TB.blue+'55':'none')+'">'+v+'</button>';
      });
      calcHtml+='</div>';
    });
    calcHtml+='</div></div>';
  }

  calcHtml+='<div onclick="toggleCalc()" class="fab" style="position:fixed;bottom:24px;right:18px;z-index:9000;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,'+TB.blue+','+TB.blueDim+');box-shadow:0 4px 22px rgba(79,142,247,.65);display:flex;align-items:center;justify-content:center;cursor:pointer">'+
    '<span style="font-size:'+(STATE.calcOpen?22:26)+'px">'+(STATE.calcOpen?'✕':'🧮')+'</span></div>';

  el.innerHTML=calcHtml;
}

function onAmtInput(curId, val){
  STATE.addAmounts[curId]=val;
  var a=n(val);
  var preview=a>0?cvt(a,curId,STATE.rates):null;
  // Update preview block
  var pBlock=document.getElementById('add-preview-'+curId);
  if(pBlock){
    if(preview){
      var CURS=[{id:'TRY',sym:'₺',c:'#EF5350'},{id:'USD',sym:'$',c:'#66BB6A'},{id:'SYP',sym:'ل.س',c:'#42A5F5'}];
      var inner='<div style="border-top:1px solid '+TB.border2+';display:grid;grid-template-columns:1fr 1fr 1fr">';
      CURS.forEach(function(cx){
        var cv=cx.id==='SYP'?parseInt(preview.syp).toLocaleString('ar'):cx.id==='USD'?parseFloat(preview.usd).toFixed(3):parseFloat(preview.try).toLocaleString('ar',{maximumFractionDigits:1});
        inner+='<div style="text-align:center;padding:5px 4px"><div style="font-size:9px;color:'+TB.textMuted+';margin-bottom:1px">'+cx.sym+'</div><div style="font-weight:900;font-size:12px;color:'+(cx.id===curId?TB.blue:cx.c)+'">'+cv+'</div></div>';
      });
      inner+='</div>';
      pBlock.innerHTML=inner;
    } else {
      pBlock.innerHTML='';
    }
  }
  // Show/hide action buttons
  var actBlock=document.getElementById('add-action-'+curId);
  if(actBlock){
    var canAdd=STATE.addName.trim()&&a>0;
    var CURS2=[{id:'TRY',c:'#EF5350'},{id:'USD',c:'#66BB6A'},{id:'SYP',c:'#42A5F5'}];
    var cc=CURS2.find(function(x){return x.id===curId;})||CURS2[0];
    if(canAdd){
      actBlock.innerHTML='<div style="border-top:1px solid '+cc.c+'33">'+
        '<button onclick="event.stopPropagation();addNewItem()" style="width:100%;padding:12px 0;background:linear-gradient(135deg,'+cc.c+','+cc.c+'BB);color:#fff;border:none;font-weight:900;font-size:15px;border-radius:0 0 8px 8px">+ مادة جديدة</button>'+
        '</div>';
      actBlock.style.display='';
    } else {
      actBlock.innerHTML='';
    }
  }
}

function doSaveEntry(){
  var a=n(STATE.addAmounts[STATE.addCur]);
  if(!STATE.addName.trim()||!a)return false;
  var cv=cvt(a,STATE.addCur,STATE.rates);
  var aKey=activeKey();
  var aLabel=activeDateLabel();
  var entry={id:Date.now(),name:STATE.addName.trim(),note:STATE.addNote.trim(),type:STATE.addType,usd:cv.usd,try:cv.try,syp:cv.syp,rateSnap:{try:STATE.rates.try,syp:STATE.rates.syp}};
  if(!STATE.expenses[aKey])STATE.expenses[aKey]=[];
  STATE.expenses[aKey].push(entry);
  // إضافة تلقائية لقائمة الديون إذا كان النوع دين
  if(STATE.addType==='debt'){
    var dEntry={id:Date.now()+1,name:entry.name,note:entry.note||'',try:entry.try,usd:entry.usd,syp:entry.syp,rateSnap:entry.rateSnap,date:aLabel,paid:false};
    STATE.debts.push(dEntry);
    saveDebts();
  }
  syncSession();
  saveExpenses();
  lsSet('hb_sticky',JSON.stringify({date:TODAY_DATE,currency:STATE.addCur}));
  return true;
}

    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
    '<button onclick="doDelExpense()" style="padding:13px 0;background:linear-gradient(135deg,#EF5350,#C62828);color:#fff;border:none;border-radius:11px;font-weight:900;font-size:14px">🗑 نعم، احذف</button>'+
    '<button onclick="closeModal()" style="padding:13px 0;background:'+TB.cardBg2+';color:'+TB.textMuted+';border:1px solid '+TB.border2+';border-radius:11px;font-weight:700">إلغاء</button>'+
    '</div></div></div>';
}

function copyText(){
  var pre=document.querySelector('#modal-layer pre');
  if(pre&&navigator.clipboard){navigator.clipboard.writeText(pre.textContent);}
  else if(pre){var r=document.createRange();r.selectNode(pre);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');}
  alert('تم النسخ!');
}

function toggleCalc(){STATE.calcOpen=!STATE.calcOpen;renderCalc();}
function calcPress(v){
  if(v==='C'){STATE.calcExpr='';STATE.calcResult='';}
  else if(v==='⌫'){STATE.calcExpr=STATE.calcExpr.slice(0,-1);STATE.calcResult='';}
  else if(v==='='){var r=safeMath(STATE.calcExpr);STATE.calcResult=r!==null?String(r):'خطأ';}
  else if(v==='±'){var b=STATE.calcResult||STATE.calcExpr;STATE.calcExpr=b[0]==='-'?b.slice(1):'-'+b;STATE.calcResult='';}
  else if(v==='%'){var r=safeMath(STATE.calcExpr);if(r!==null){STATE.calcResult=String(parseFloat((r/100).toFixed(10)));}}
  else{if(STATE.calcResult){STATE.calcExpr=STATE.calcResult+v;STATE.calcResult='';}else STATE.calcExpr+=v;}
  // Targeted update — no full re-render, no flicker
  var exprEl=document.getElementById('calc-expr-disp');
  var numEl =document.getElementById('calc-num-disp');
  var display=STATE.calcResult||STATE.calcExpr||'0';
  if(exprEl) exprEl.textContent=STATE.calcExpr||'';
  if(numEl){numEl.textContent=display;numEl.style.color=STATE.calcResult?'#4ADE80':TB.text;}
}

function escHtml(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

window.addEventListener('popstate',function(e){
  var s=e.state||{view:'months'};
  // إذا كان مودال مفتوح — أغلقه فقط
  if(STATE.modal){
    STATE.modal=null;
    renderModal();
    return;
  }
  // وإلا — تنقل للصفحة
  STATE.view=s.view||'months';
  if(s.month!==undefined)STATE.selMonth=s.month;
  if(s.day!==undefined)STATE.selDay=s.day;
  render();
});


/* ══════════════════════════════════════
   KEYBOARD SCROLL — منع التغطية
══════════════════════════════════════ */
document.addEventListener('focusin', function(e){
  var el=e.target;
  if(el.tagName==='INPUT'||el.tagName==='TEXTAREA'){
    setTimeout(function(){
      el.scrollIntoView({block:'center',behavior:'smooth'});
    }, 320); // انتظر فتح لوحة المفاتيح
  }
});

// للأجهزة التي تدعم visualViewport (أندرويد/iOS)
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', function(){
    var modal=document.querySelector('.modal');
    var modalC=document.querySelector('.modal-center');
    var active=document.activeElement;
    if(!active||(active.tagName!=='INPUT'&&active.tagName!=='TEXTAREA'))return;
    setTimeout(function(){
      active.scrollIntoView({block:'center',behavior:'smooth'});
    }, 100);
    // تحريك المودال ليظهر فوق لوحة المفاتيح
    var vv=window.visualViewport;
    var offset=window.innerHeight - vv.height - vv.offsetTop;
    if(modal)  modal.style.transform  = offset>0 ? 'translateY(-'+Math.min(offset,200)+'px)' : '';
    if(modalC) modalC.style.transform = offset>0 ? 'translateY(-'+Math.min(offset/2,120)+'px)' : '';
  });
  window.visualViewport.addEventListener('scroll', function(){
    var active=document.activeElement;
    if(active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA')){
      setTimeout(function(){active.scrollIntoView({block:'center',behavior:'smooth'});},80);
    }
  });
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
function _loadState(){
  var expRaw=lsGet('hb_expenses');
  var ratRaw=lsGet('hb_rates');
  var stkRaw=lsGet('hb_sticky');
  var sprRaw=lsGet('hb_spender');
  var tsRaw =lsGet('hb_rate_ts');
  if(expRaw)try{STATE.expenses=JSON.parse(expRaw);}catch(e){}
  if(ratRaw)try{STATE.rates=JSON.parse(ratRaw);}catch(e){}
  if(stkRaw){try{var sk=JSON.parse(stkRaw);STATE.addCur=sk.currency||'TRY';}catch(e){}}
  if(sprRaw)STATE.spender=sprRaw;
  var incRaw=lsGet('hb_income');
  if(incRaw)try{STATE.income=JSON.parse(incRaw);}catch(e){}
  var debRaw=lsGet('hb_debts');
  if(debRaw)try{STATE.debts=JSON.parse(debRaw);}catch(e){}
  syncSession();
  var savedId=lsGet('hb_sync_id');
  if(savedId){SYNC.blobId=savedId;SYNC.code=codeFromId(savedId);SYNC.status='ok';startPoll();syncPull(true);}
  window.history.replaceState({view:'months'},'');
  STATE.view='months';
  // تهيئة المزامنة التلقائية الصامتة + إنشاء معرف المستخدم
  getOrCreateUID();
  lsGet('hb_reg_date')||lsSet('hb_reg_date',Date.now().toString());// تسجيل تاريخ أول تشغيل
  setTimeout(autoSyncInit, 5000);// مزامنة اختيارية
  if(!sprRaw){STATE.modal='setup';render();return;}

  // فحص ترخيص التجربة المجانية
  var lic=getLicenseStatus();
  if(lic.status==='expired'){
    // انتهت التجربة — اعرض شاشة التفعيل (البيانات سليمة)
    render();
    setTimeout(function(){
      document.getElementById('app').innerHTML=renderExpiredScreen();
    },50);
    return;
  }

  // ذكر اليوم
  var today2=new Date();
  var todayKey2=today2.getFullYear()+'-'+(today2.getMonth()+1)+'-'+today2.getDate();
  var savedDhikrDay=lsGet('hb_dhikr_ts')||'';
  if(savedDhikrDay!==todayKey2){
    STATE.modal='dhikr';
  } else {
    var lastTs=tsRaw?parseInt(tsRaw):0;
    if(Date.now()-lastTs>H24)STATE.modal='rateReminder';
  }
  render();
}

function init(){
  STATE.view='loading';render();
  // إذا كان localStorage فارغاً — حاول الاسترجاع من IndexedDB أولاً
  var hasLS=_IDB_KEYS.some(function(k){return lsGet(k)!==null;});
  if(!hasLS){
    // localStorage فارغ — نسترجع من IndexedDB
    idbRestoreAll(function(){
      _loadState();
    });
  } else {
    _loadState();
    // تأكد من مزامنة IDB بالبيانات الحالية في الخلفية
    setTimeout(function(){
      _IDB_KEYS.forEach(function(k){var v=lsGet(k);if(v!==null)idbSet(k,v);});
    },1500);
  }
}

init();
